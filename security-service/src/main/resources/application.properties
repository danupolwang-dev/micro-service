spring.application.name=security-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/security_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# JWT Secret (You should change this in production)
jwt.secret=mySecretKey12345678901234567890123456789012
jwt.expiration=3600000
jwt.refresh.expiration=86400000

# User Service URL (Direct internal communication to avoid Gateway loop)
user.service.url=http://localhost:8082
