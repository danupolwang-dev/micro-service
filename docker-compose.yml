version: '3.8'

services:
  # ฐานข้อมูล MySQL สำหรับเก็บข้อมูลของทุก Microservices
  db:
    image: mysql:8
    container_name: local-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=security_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # หากมีไฟล์ SQL สำหรับสร้างตารางเริ่มต้น ให้เอามาวางในโฟลเดอร์ db-init
      - ./db-init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
