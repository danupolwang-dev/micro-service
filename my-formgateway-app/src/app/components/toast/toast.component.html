<div class="toast-container">
    <div *ngFor="let toast of toasts" class="toast-item" [ngClass]="toast.type" (click)="remove(toast.id)">
        <div class="toast-icon">
            <i class="fa" [ngClass]="getIcon(toast.type)"></i>
        </div>
        <div class="toast-message">
            {{ toast.message }}
        </div>
        <button class="toast-close">&times;</button>
    </div>
</div>
