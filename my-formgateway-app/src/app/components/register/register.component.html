<div class="register-container container">
  <div class="glass-card register-glass">
    <div class="text-center mb-3">
      <h2 class="text-gradient h3">Register for Inventory & CRM</h2>
      <p class="text-secondary small">Create your enterprise account to get started.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="section-title"><i class="fas fa-id-card me-2"></i> Account Profile</div>

      <div class="row g-3 mb-2">
        <div class="col-md-6">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-user"></i></span>
            <input type="text" id="username" formControlName="username" class="form-control border-start-0"
              placeholder="johndoe">
          </div>
        </div>
        <div class="col-md-6">
          <label for="mobileNo" class="form-label">Mobile Number</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-phone"></i></span>
            <input type="text" id="mobileNo" formControlName="mobileNo" class="form-control border-start-0"
              placeholder="+1 234 567 890">
          </div>
        </div>
      </div>

      <div class="mb-2">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
          <input type="email" id="email" formControlName="email" class="form-control border-start-0"
            placeholder="john@example.com">
        </div>
      </div>

      <div class="section-title mt-3"><i class="fas fa-key me-2"></i> Security</div>

      <div class="row g-3 mb-2">
        <div class="col-md-6">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" formControlName="password" class="form-control" placeholder="••••••••">
        </div>
        <div class="col-md-6">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
            placeholder="••••••••">
        </div>
      </div>

      <div
        *ngIf="registerForm.errors?.['mismatch'] && (registerForm.get('confirmPassword')?.touched || registerForm.get('confirmPassword')?.dirty)"
        class="alert alert-warning glass-card mb-4">
        <i class="fas fa-exclamation-triangle me-2"></i> Passwords do not match.
      </div>

      <div *ngIf="passwordErrors.length > 0" class="password-requirements">
        <p class="small fw-bold text-danger mb-2">Password Requirements:</p>
        <ul>
          <li *ngFor="let error of passwordErrors">{{ error }}</li>
        </ul>
      </div>

      <div *ngIf="registrationError" class="alert alert-danger glass-card mb-4" role="alert">
        <i class="fas fa-times-circle me-2"></i> {{ registrationError }}
      </div>

      <button type="submit" class="btn-premium w-100 py-2 mt-3" [disabled]="!registerForm.valid">
        <i class="fas fa-user-plus me-2"></i> Create Account
      </button>
    </form>

    <div class="register-footer">
      <p>Already a member? <a routerLink="/login">Log in to your account</a></p>
    </div>
  </div>
</div>
